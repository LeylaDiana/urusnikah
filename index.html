<!DOCTYPE html>
<html lang="ms" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UrusNikah Pro</title>

<!-- Libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: { navy:'#001f3f', gold:'#d4af37' },
      fontFamily: { sans:['Outfit','sans-serif'] }
    }
  }
}
</script>

<style>
body{font-family:Outfit,sans-serif}
</style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen">

<!-- Loading -->
<div id="loading" class="fixed inset-0 bg-navy flex items-center justify-center z-50">
  <p class="text-white font-bold animate-pulse">Memuatkan...</p>
</div>

<!-- AUTH -->
<div id="auth" class="hidden fixed inset-0 flex items-center justify-center bg-navy p-6">
  <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl w-full max-w-md space-y-4">
    <h2 class="text-2xl font-bold text-center">UrusNikah</h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800">

    <input id="password" type="password" placeholder="Kata Laluan"
      class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800">

    <button onclick="handleAuth()"
      class="w-full bg-navy text-gold font-bold p-3 rounded-xl">
      Log Masuk / Daftar
    </button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden p-6 space-y-6">

  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">Dashboard</h1>
    <button onclick="toggleDark()" class="px-4 py-2 bg-slate-200 dark:bg-slate-800 rounded-xl">
      Mode
    </button>
  </div>

  <div class="bg-navy text-white p-6 rounded-3xl text-center">
    <h2 class="text-lg font-bold mb-4">Countdown Majlis</h2>
    <div class="text-3xl font-black" id="countdown">--</div>
  </div>

  <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl space-y-3">
    <h2 class="font-bold">Nama Pengantin</h2>
    <input id="groom" placeholder="Lelaki"
      class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800">

    <input id="bride" placeholder="Perempuan"
      class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800">

    <input id="wdate" type="date"
      class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800">

    <button onclick="saveProfile()"
      class="w-full bg-gold text-navy font-bold p-3 rounded-xl">
      Simpan
    </button>
  </div>

</div>

<script>
const SUPABASE_URL="https://lzbwmpnggvvnhvwqpzun.supabase.co";
const SUPABASE_KEY="YOUR_ANON_KEY_HERE"; // ⚠️ Ganti jika perlu
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let user=null;
let countdownInterval=null;

/* ---------- AUTH ---------- */
async function handleAuth(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;

  if(!email||!password) return alert("Isi email & password");

  const { error } = await supabaseClient.auth.signInWithPassword({ email,password });

  if(error){
    const reg = await supabaseClient.auth.signUp({ email,password });
    if(reg.error) alert(reg.error.message);
  }
}

/* ---------- LOGIC ---------- */
supabaseClient.auth.onAuthStateChange(async (event, session)=>{
  if(session){
    user=session.user;
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    await loadProfile();
  }else{
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
  document.getElementById("loading").classList.add("hidden");
});

/* ---------- PROFILE ---------- */
async function loadProfile(){
  const { data } = await supabaseClient
    .from('profiles')
    .select('*')
    .eq('id',user.id)
    .single();

  if(data){
    document.getElementById("groom").value=data.groom_name||"";
    document.getElementById("bride").value=data.bride_name||"";
    document.getElementById("wdate").value=data.wedding_date||"";
    startCountdown(data.wedding_date);
  }
}

async function saveProfile(){
  const updates={
    id:user.id,
    groom_name:document.getElementById("groom").value,
    bride_name:document.getElementById("bride").value,
    wedding_date:document.getElementById("wdate").value
  };

  await supabaseClient.from('profiles').upsert(updates);
  alert("Disimpan!");
  startCountdown(updates.wedding_date);
}

/* ---------- COUNTDOWN ---------- */
function startCountdown(date){
  if(countdownInterval) clearInterval(countdownInterval);
  if(!date) return;

  const target=new Date(date).getTime();

  function update(){
    const now=new Date().getTime();
    const diff=target-now;

    if(diff<=0){
      document.getElementById("countdown").innerText="Hari Bahagia 🎉";
      return;
    }

    const days=Math.floor(diff/(1000*60*60*24));
    document.getElementById("countdown") .innerText=days+" Hari Lagi";
  }

  update();
  countdownInterval=setInterval(update,60000);
}

/* ---------- DARK MODE ---------- */
function toggleDark(){
  document.documentElement.classList.toggle("dark");
}

/* ---------- INIT ---------- */
window.onload=()=>{ lucide.createIcons(); };
</script>

</body>
</html>
