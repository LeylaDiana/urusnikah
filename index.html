<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrusNikah - Perancang Perkahwinan Melayu Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4899;
            --primary-dark: #db2777;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark {
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        /* Prevent background scroll when mobile menu open */
        body.menu-open {
            overflow: hidden;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -50%;
            width: 100%;
            height: 2px;
            background: #e2e8f0;
            z-index: -1;
        }
        .dark .timeline-item::after { background: #334155; }
        .timeline-item:last-child::after { display: none; }

        .bg-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
        .dark .bg-glass {
            background: rgba(30, 41, 59, 0.8);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-700">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-pink-100 dark:bg-pink-900/30 rounded-2xl flex items-center justify-center mx-auto mb-4 text-pink-600">
                    <i data-lucide="heart" class="w-8 h-8 fill-current"></i>
                </div>
                <h1 class="text-2xl font-bold dark:text-white">Selamat Datang ke UrusNikah</h1>
                <p class="text-slate-500 dark:text-slate-400">Rancang hari bahagia anda dengan tenang</p>
            </div>

            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm rounded-lg border border-red-100 dark:border-red-800"></div>
            <div id="auth-success" class="hidden mb-4 p-3 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 text-sm rounded-lg border border-emerald-100 dark:border-emerald-800"></div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Email</label>
                    <input type="email" id="auth-email" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="anda@contoh.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Kata Laluan</label>
                    <input type="password" id="auth-password" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:ring-2 focus:ring-pink-500 outline-none" placeholder="••••••••" required>
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-pink-200 dark:shadow-none">
                    Log Masuk
                </button>
            </form>

            <div class="mt-6 text-center">
                <button id="toggle-auth-mode" class="text-pink-600 font-medium text-sm hover:underline">
                    Belum ada akaun? Daftar sekarang
                </button>
            </div>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="app-ui" class="hidden min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="h-full flex flex-col p-6">
                <div class="flex items-center gap-3 mb-10 px-2">
                    <div class="w-10 h-10 bg-pink-600 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="gem" class="w-6 h-6"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">UrusNikah</span>
                </div>

                <nav class="flex-1 space-y-1 custom-scrollbar overflow-y-auto">
                    <button onclick="switchTab('dashboard')" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                    </button>
                    <button onclick="switchTab('checklist')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="check-square" class="w-5 h-5"></i> Senarai Semak
                    </button>
                    <button onclick="switchTab('budget')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="wallet" class="w-5 h-5"></i> Bajet & Kewangan
                    </button>
                    <button onclick="switchTab('guests')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="users" class="w-5 h-5"></i> Senarai Tetamu
                    </button>
                    <button onclick="switchTab('vendors')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="store" class="w-5 h-5"></i> Vendor & Servis
                    </button>
                    <button onclick="switchTab('islamic')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="moon" class="w-5 h-5"></i> Panduan Nikah
                    </button>
                    <button onclick="switchTab('hantaran')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="gift" class="w-5 h-5"></i> Hantaran & Pakaian
                    </button>
                    <button onclick="switchTab('settings')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="settings" class="w-5 h-5"></i> Tetapan
                    </button>
                </nav>

                <div class="mt-auto pt-6 border-t border-slate-100 dark:border-slate-800">
                    <div class="flex items-center gap-3 px-2 mb-4">
                        <div id="user-avatar" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-600 dark:text-slate-300">
                            U
                        </div>
                        <div class="flex-1 min-w-0">
                            <p id="user-email-display" class="text-sm font-semibold truncate">User</p>
                            <p class="text-xs text-slate-500">Plan: Standard</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i> Log Keluar
                    </button>
                </div>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-h-screen max-h-screen overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 sticky top-0 z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 id="current-tab-title" class="text-lg font-bold">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-3">
                    <div id="saving-indicator" class="hidden items-center gap-2 text-xs text-slate-500 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full">
                        <div class="w-2 h-2 bg-pink-500 rounded-full animate-pulse"></div>
                        Menyimpan...
                    </div>
                    <div id="saved-badge" class="hidden items-center gap-2 text-xs text-emerald-600 bg-emerald-50 dark:bg-emerald-900/20 px-3 py-1 rounded-full border border-emerald-100 dark:border-emerald-800">
                        <i data-lucide="check" class="w-3 h-3"></i> Tersimpan
                    </div>
                    <button onclick="toggleDarkMode()" class="p-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
                        <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
                    </button>
                    <button class="p-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors relative">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-pink-500 rounded-full border-2 border-white dark:border-slate-900"></span>
                    </button>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div id="tab-content" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                <!-- Content will be injected here via JavaScript -->
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0"></div>
        <div id="modal-content" class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto relative z-10 p-6 md:p-8 custom-scrollbar border border-slate-100 dark:border-slate-700">
            <!-- Dynamic Modal Content -->
        </div>
    </div>

    <script>
        // --- Initialization & State ---
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        let currentTab = 'dashboard';
        let authMode = 'login'; // login or signup

        let state = {
            profile: {
                name: "User",
                partnerName: "Pasangan",
                weddingDate: "2026-12-12",
                location: "Kuala Lumpur",
                budgetLimit: 30000,
                themeColor: "#ec4899"
            },
            checklist: [],
            budget: [],
            guests: [],
            vendors: [],
            hantaran: [],
            attire: {
                measurements: {},
                appointments: []
            }
        };

        const categories = {
            checklist: ["PENTING", "DOKUMEN", "KEWANGAN", "PAKAIAN", "MAJLIS", "LAIN-LAIN"],
            budget: ["Katering", "Dewan", "Hiasan", "Baju", "Cenderamata", "Jurufoto", "Hantaran", "Lain-lain"],
            guestGroups: ["Keluarga Lelaki", "Keluarga Perempuan", "Rakan Sekolah", "Rakan Kerja", "VVIP", "Jiran"],
            priorities: ["Wajib", "Penting", "Boleh Tangguh"]
        };

        // --- Auth Logic ---
        const handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');

            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            try {
                if (authMode === 'login') {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    await auth.createUserWithEmailAndPassword(email, password);
                    successEl.innerText = "Akaun berjaya didaftarkan!";
                    successEl.classList.remove('hidden');
                }
            } catch (error) {
                let msg = "Ralat berlaku. Sila cuba lagi.";
                if (error.code === 'auth/wrong-password') msg = "Kata laluan salah.";
                if (error.code === 'auth/user-not-found') msg = "Akaun tidak dijumpai.";
                if (error.code === 'auth/invalid-email') msg = "Format email tidak sah.";
                if (error.code === 'auth/weak-password') msg = "Kata laluan terlalu lemah.";
                errorEl.innerText = msg;
                errorEl.classList.remove('hidden');
            }
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-ui').classList.remove('hidden');
                document.getElementById('user-email-display').innerText = user.email;
                document.getElementById('user-avatar').innerText = user.email[0].toUpperCase();
                loadData();
            } else {
                currentUser = null;
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('app-ui').classList.add('hidden');
            }
        });

        document.getElementById('auth-form').addEventListener('submit', handleAuth);
        document.getElementById('toggle-auth-mode').addEventListener('click', () => {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('auth-submit-btn').innerText = authMode === 'login' ? 'Log Masuk' : 'Daftar Akaun';
            document.getElementById('toggle-auth-mode').innerText = authMode === 'login' ? 'Belum ada akaun? Daftar sekarang' : 'Sudah ada akaun? Log masuk';
        });

        document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

        // --- Data Persistence ---
        const showSaving = () => {
            document.getElementById('saving-indicator').classList.remove('hidden');
            document.getElementById('saving-indicator').classList.add('flex');
            document.getElementById('saved-badge').classList.add('hidden');
        };

        const showSaved = () => {
            document.getElementById('saving-indicator').classList.add('hidden');
            document.getElementById('saving-indicator').classList.remove('flex');
            document.getElementById('saved-badge').classList.remove('hidden');
            document.getElementById('saved-badge').classList.add('flex');
            setTimeout(() => {
                document.getElementById('saved-badge').classList.add('hidden');
            }, 3000);
        };

        const saveData = async () => {
            if (!currentUser) return;
            showSaving();
            try {
                await db.doc(`artifacts/${appId}/users/${currentUser.uid}/data/main`).set(state);
                showSaved();
            } catch (e) {
                console.error("Save error:", e);
            }
        };

        const loadData = async () => {
            if (!currentUser) return;
            try {
                const doc = await db.doc(`artifacts/${appId}/users/${currentUser.uid}/data/main`).get();
                if (doc.exists) {
                    state = { ...state, ...doc.data() };
                }
                renderCurrentTab();
            } catch (e) {
                console.error("Load error:", e);
            }
        };

        // --- Utilities ---
        const formatMalayDate = (dateStr) => {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            const months = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR' }).format(amount || 0);
        };

        const toggleDarkMode = () => {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            document.getElementById('theme-icon').setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        };

        const toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = sidebar.classList.contains('translate-x-0');
            
            if (isOpen) {
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                document.body.classList.remove('menu-open');
            } else {
                sidebar.classList.add('translate-x-0');
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                document.body.classList.add('menu-open');
            }
        };

        const switchTab = (tabId) => {
            currentTab = tabId;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-pink-50', 'text-pink-600', 'dark:bg-pink-900/20', 'dark:text-pink-400');
            });
            event.currentTarget.classList.add('bg-pink-50', 'text-pink-600', 'dark:bg-pink-900/20', 'dark:text-pink-400');
            document.getElementById('current-tab-title').innerText = event.currentTarget.innerText.trim();
            
            // Auto close mobile menu
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
            
            renderCurrentTab();
        };

        const showModal = (contentHtml) => {
            document.getElementById('modal-content').innerHTML = contentHtml;
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-container').classList.add('flex');
            lucide.createIcons();
        };

        const closeModal = () => {
            document.getElementById('modal-container').classList.add('hidden');
            document.getElementById('modal-container').classList.remove('flex');
        };

        // --- Render Functions ---
        const renderCurrentTab = () => {
            const container = document.getElementById('tab-content');
            lucide.createIcons();
            
            switch (currentTab) {
                case 'dashboard': renderDashboard(container); break;
                case 'checklist': renderChecklist(container); break;
                case 'budget': renderBudget(container); break;
                case 'guests': renderGuests(container); break;
                case 'islamic': renderIslamic(container); break;
                case 'hantaran': renderHantaran(container); break;
                case 'vendors': renderVendors(container); break;
                case 'settings': renderSettings(container); break;
            }
            lucide.createIcons();
        };

        const renderDashboard = (container) => {
            const completedTasks = state.checklist.filter(t => t.completed).length;
            const totalTasks = state.checklist.length || 1;
            const progress = Math.min(100, Math.round((completedTasks / totalTasks) * 100));
            
            // Circular Progress Logic
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (progress / 100) * circumference;

            const weddingDate = new Date(state.profile.weddingDate);
            const now = new Date();
            const daysLeft = Math.ceil((weddingDate - now) / (1000 * 60 * 60 * 24));

            container.innerHTML = `
                <div class="space-y-8">
                    <!-- Progress Card -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 bg-white dark:bg-slate-800 p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col md:flex-row items-center gap-8">
                            <div class="relative w-40 h-40">
                                <svg class="w-full h-full" viewBox="0 0 100 100">
                                    <circle class="text-slate-100 dark:text-slate-700 stroke-current" stroke-width="8" fill="transparent" r="${radius}" cx="50" cy="50"></circle>
                                    <circle class="text-pink-500 stroke-current progress-ring__circle" stroke-width="8" stroke-linecap="round" fill="transparent" r="${radius}" cx="50" cy="50" style="stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset}"></circle>
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center">
                                    <span class="text-3xl font-bold text-slate-800 dark:text-white">${progress}%</span>
                                    <span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Siap</span>
                                </div>
                            </div>
                            <div class="flex-1 text-center md:text-left">
                                <h3 class="text-2xl font-bold mb-2">Persediaan Perkahwinan</h3>
                                <p class="text-slate-500 dark:text-slate-400 mb-6">Anda telah menyelesaikan ${completedTasks} daripada ${state.checklist.length} tugasan. Teruskan usaha!</p>
                                <div class="flex flex-wrap justify-center md:justify-start gap-4">
                                    <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-2xl flex items-center gap-3">
                                        <div class="w-10 h-10 bg-blue-500 text-white rounded-xl flex items-center justify-center">
                                            <i data-lucide="calendar" class="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <p class="text-xs text-blue-600 dark:text-blue-400 font-medium">Tarikh</p>
                                            <p class="text-sm font-bold">${formatMalayDate(state.profile.weddingDate)}</p>
                                        </div>
                                    </div>
                                    <div class="bg-amber-50 dark:bg-amber-900/20 p-3 rounded-2xl flex items-center gap-3">
                                        <div class="w-10 h-10 bg-amber-500 text-white rounded-xl flex items-center justify-center">
                                            <i data-lucide="clock" class="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <p class="text-xs text-amber-600 dark:text-amber-400 font-medium">Baki Hari</p>
                                            <p class="text-sm font-bold">${daysLeft > 0 ? daysLeft + ' Hari' : 'Hari Bahagia!'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Weather Widget -->
                        <div class="bg-gradient-to-br from-sky-400 to-blue-600 p-6 rounded-3xl shadow-sm text-white flex flex-col justify-between">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-sky-100 font-medium">Ramalan Cuaca</p>
                                    <h4 class="text-xl font-bold">${state.profile.location}</h4>
                                </div>
                                <i data-lucide="cloud-sun" class="w-10 h-10"></i>
                            </div>

                                            <td class="px-6 py-4"><span class="px-2 py-0.5 rounded-full text-[10px] ${item.ready ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'} font-bold">${item.ready ? 'Siap' : 'Dalam Proses'}</span></td>
                                            <td class="px-6 py-4 text-right font-bold">${item.value || 0}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <h3 class="text-xl font-bold">Ukuran & Fitting Baju</h3>
                        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700">
                            <div class="grid grid-cols-2 gap-6 mb-8">
                                <div><p class="text-xs text-slate-500 mb-1">Bahu</p><p class="font-bold border-b dark:border-slate-700 pb-2">15"</p></div>
                                <div><p class="text-xs text-slate-500 mb-1">Dada</p><p class="font-bold border-b dark:border-slate-700 pb-2">36"</p></div>
                                <div><p class="text-xs text-slate-500 mb-1">Pinggang</p><p class="font-bold border-b dark:border-slate-700 pb-2">28"</p></div>
                                <div><p class="text-xs text-slate-500 mb-1">Punggung</p><p class="font-bold border-b dark:border-slate-700 pb-2">38"</p></div>
                            </div>
                            <h4 class="font-bold text-sm mb-4">Temujanji Butik/Tailor</h4>
                            <div class="space-y-3">
                                <div class="p-3 bg-pink-50 dark:bg-pink-900/20 rounded-xl flex justify-between items-center">
                                    <div>
                                        <p class="text-xs font-bold text-pink-600">Fitting Pertama</p>
                                        <p class="text-sm font-medium">15 Jan 2026, 2:30 PM</p>
                                    </div>
                                    <i data-lucide="check-circle-2" class="text-pink-600 w-5 h-5"></i>
                                </div>
                                <div class="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl flex justify-between items-center">
                                    <div>
                                        <p class="text-xs font-bold text-slate-500">Pick-up Baju</p>
                                        <p class="text-sm font-medium">10 Mac 2026, 11:00 AM</p>
                                    </div>
                                    <i data-lucide="clock" class="text-slate-400 w-5 h-5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderVendors = (container) => {
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold">Pengurusan Vendor</h3>
                        <button onclick="openAddVendorModal()" class="bg-pink-600 text-white px-5 py-2.5 rounded-xl font-semibold hover:bg-pink-700 transition-all">Tambah Vendor</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${state.vendors.length === 0 ? '<div class="col-span-full py-20 text-center text-slate-400">Tiada vendor lagi.</div>' : 
                            state.vendors.map((v, idx) => `
                            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-12 h-12 bg-pink-50 text-pink-600 rounded-xl flex items-center justify-center font-bold text-lg">${v.name[0]}</div>
                                    <div class="flex gap-1 text-amber-400">
                                        <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                        <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                        <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                        <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                                        <i data-lucide="star" class="w-4 h-4"></i>
                                    </div>
                                </div>
                                <h4 class="font-bold text-lg mb-1">${v.name}</h4>
                                <p class="text-xs text-slate-500 mb-4 uppercase tracking-wider">${v.category}</p>
                                <div class="space-y-2 mb-6">
                                    <div class="flex justify-between text-sm">
                                        <span class="text-slate-500">Harga Pakej</span>
                                        <span class="font-bold">${formatCurrency(v.price)}</span>
                                    </div>
                                    <div class="flex justify-between text-sm">
                                        <span class="text-slate-500">Baki Bayaran</span>
                                        <span class="text-red-500 font-bold">${formatCurrency(v.price - v.deposit)}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button class="flex-1 bg-slate-100 dark:bg-slate-900 py-2 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all">Hubungi</button>
                                    <button onclick="deleteVendor(${idx})" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const renderSettings = (container) => {
            container.innerHTML = `
                <div class="max-w-2xl mx-auto space-y-8">
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-100 dark:border-slate-700">
                        <h3 class="text-xl font-bold mb-6">Profil & Tarikh Penting</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1 text-slate-500">Nama Anda</label>
                                <input type="text" id="set-name" value="${state.profile.name}" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1 text-slate-500">Nama Pasangan</label>
                                <input type="text" id="set-partner" value="${state.profile.partnerName}" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-500">Tarikh Majlis</label>
                                    <input type="date" id="set-date" value="${state.profile.weddingDate}" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 text-slate-500">Limit Bajet (RM)</label>
                                    <input type="number" id="set-budget" value="${state.profile.budgetLimit}" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                            </div>
                            <button onclick="saveProfile()" class="w-full bg-pink-600 text-white font-bold py-3 rounded-xl hover:bg-pink-700 transition-all shadow-lg shadow-pink-200 dark:shadow-none mt-4">Simpan Profil</button>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-100 dark:border-slate-700">
                        <h3 class="text-xl font-bold mb-6">Sistem & Data</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl">
                                <div>
                                    <p class="font-bold">Mod Gelap</p>
                                    <p class="text-xs text-slate-500">Aktifkan tema gelap untuk mata selesa</p>
                                </div>
                                <button onclick="toggleDarkMode()" class="w-12 h-6 bg-slate-300 dark:bg-pink-600 rounded-full relative transition-all">
                                    <div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${isDarkMode ? 'translate-x-6' : ''}"></div>
                                </button>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl">
                                <div>
                                    <p class="font-bold">Export Data (PDF)</p>
                                    <p class="text-xs text-slate-500">Muat turun laporan perancangan lengkap</p>
                                </div>
                                <button class="p-2 text-slate-500 hover:text-pink-600"><i data-lucide="download" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- Action Handlers ---
        const openAddTaskModal = () => {
            showModal(`
                <h3 class="text-2xl font-bold mb-6">Tambah Tugasan Baru</h3>
                <div class="space-y-4">
                    <input type="text" id="new-task-title" placeholder="Nama tugasan..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="new-task-cat" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                            ${categories.checklist.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <select id="new-task-pri" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                            ${categories.priorities.map(p => `<option value="${p}">${p}</option>`).join('')}
                        </select>
                    </div>
                    <input type="date" id="new-task-date" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                    <button onclick="addTask()" class="w-full bg-pink-600 text-white font-bold py-4 rounded-xl mt-4">Simpan Tugasan</button>
                    <button onclick="closeModal()" class="w-full text-slate-500 font-bold py-2">Batal</button>
                </div>
            `);
        };

        const addTask = () => {
            const title = document.getElementById('new-task-title').value;
            if (!title) return;
            state.checklist.push({
                title,
                category: document.getElementById('new-task-cat').value,
                priority: document.getElementById('new-task-pri').value,
                deadline: document.getElementById('new-task-date').value,
                completed: false
            });
            saveData();
            closeModal();
            renderChecklist(document.getElementById('tab-content'));
        };

        const toggleTask = (idx) => {
            state.checklist[idx].completed = !state.checklist[idx].completed;
            saveData();
            renderChecklist(document.getElementById('tab-content'));
        };

        const deleteTask = (idx) => {
            state.checklist.splice(idx, 1);
            saveData();
            renderChecklist(document.getElementById('tab-content'));
        };

        const openAddBudgetModal = () => {
            showModal(`
                <h3 class="text-2xl font-bold mb-6">Rekod Perbelanjaan</h3>
                <div class="space-y-4">
                    <input type="text" id="new-bud-name" placeholder="Nama item/servis..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                    <select id="new-bud-cat" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                        ${categories.budget.map(c => `<option value="${c}">${c}</option>`).join('')}
                    </select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="new-bud-target" placeholder="Anggaran (RM)" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                        <input type="number" id="new-bud-actual" placeholder="Sebenar (RM)" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                    </div>
                    <div class="flex items-center gap-2 px-2">
                        <input type="checkbox" id="new-bud-paid" class="w-4 h-4 rounded text-pink-600 focus:ring-pink-500">
                        <label for="new-bud-paid" class="text-sm">Bayaran Penuh Selesai</label>
                    </div>
                    <button onclick="addBudget()" class="w-full bg-pink-600 text-white font-bold py-4 rounded-xl mt-4">Simpan Item</button>
                    <button onclick="closeModal()" class="w-full text-slate-500 font-bold py-2">Batal</button>
                </div>
            `);
        };

        const addBudget = () => {
            const name = document.getElementById('new-bud-name').value;
            if (!name) return;
            state.budget.push({
                name,
                category: document.getElementById('new-bud-cat').value,
                target: parseFloat(document.getElementById('new-bud-target').value) || 0,
                actual: parseFloat(document.getElementById('new-bud-actual').value) || 0,
                paid: document.getElementById('new-bud-paid').checked
            });
            saveData();
            closeModal();
            renderBudget(document.getElementById('tab-content'));
        };

        const deleteBudget = (idx) => {
            state.budget.splice(idx, 1);
            saveData();
            renderBudget(document.getElementById('tab-content'));
        };

        const openAddGuestModal = () => {
            showModal(`
                <h3 class="text-2xl font-bold mb-6">Tambah Tetamu</h3>
                <div class="space-y-4">
                    <input type="text" id="new-guest-name" placeholder="Nama tetamu..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="new-guest-group" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                            ${categories.guestGroups.map(g => `<option value="${g}">${g}</option>`).join('')}
                        </select>
                        <input type="number" id="new-guest-pax" placeholder="Pax" value="1" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                    </div>
                    <select id="new-guest-status" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                        <option value="Menunggu">Menunggu RSVP</option>
                        <option value="Hadir">Hadir</option>
                        <option value="Tidak Hadir">Tidak Hadir</option>
                    </select>
                    <button onclick="addGuest()" class="w-full bg-pink-600 text-white font-bold py-4 rounded-xl mt-4">Simpan Tetamu</button>
                    <button onclick="closeModal()" class="w-full text-slate-500 font-bold py-2">Batal</button>
                </div>
            `);
        };

        const addGuest = () => {
            const name = document.getElementById('new-guest-name').value;
            if (!name) return;
            state.guests.push({
                name,
                group: document.getElementById('new-guest-group').value,
                pax: parseInt(document.getElementById('new-guest-pax').value) || 1,
                status: document.getElementById('new-guest-status').value,
                table: ""
            });
            saveData();
            closeModal();
            renderGuests(document.getElementById('tab-content'));
        };

        const deleteGuest = (idx) => {
            state.guests.splice(idx, 1);
            saveData();
            renderGuests(document.getElementById('tab-content'));
        };

        const openAddVendorModal = () => {
            showModal(`
                <h3 class="text-2xl font-bold mb-6">Daftar Vendor</h3>
                <div class="space-y-4">
                    <input type="text" id="v-name" placeholder="Nama Syarikat/Individu..." class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none focus:ring-2 focus:ring-pink-500">
                    <input type="text" id="v-cat" placeholder="Kategori (cth: Katering)" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="v-price" placeholder="Harga Pakej (RM)" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                        <input type="number" id="v-deposit" placeholder="Deposit Paid (RM)" class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 outline-none">
                    </div>
                    <button onclick="addVendor()" class="w-full bg-pink-600 text-white font-bold py-4 rounded-xl mt-4">Simpan Vendor</button>
                </div>
            `);
        };

        const addVendor = () => {
            const name = document.getElementById('v-name').value;
            if (!name) return;
            state.vendors.push({
                name,
                category: document.getElementById('v-cat').value,
                price: parseFloat(document.getElementById('v-price').value) || 0,
                deposit: parseFloat(document.getElementById('v-deposit').value) || 0
            });
            saveData();
            closeModal();
            renderVendors(document.getElementById('tab-content'));
        };

        const deleteVendor = (idx) => {
            state.vendors.splice(idx, 1);
            saveData();
            renderVendors(document.getElementById('tab-content'));
        };

        const saveProfile = () => {
            state.profile.name = document.getElementById('set-name').value;
            state.profile.partnerName = document.getElementById('set-partner').value;
            state.profile.weddingDate = document.getElementById('set-date').value;
            state.profile.budgetLimit = parseFloat(document.getElementById('set-budget').value) || 30000;
            saveData();
            renderCurrentTab();
        };

        // --- Lifecycle ---
        window.onload = () => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            lucide.createIcons();
            
            // Auto-resize check on window change
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 768) {
                    const sidebar = document.getElementById('sidebar');
                    sidebar.classList.remove('-translate-x-full');
                    sidebar.classList.add('translate-x-0');
                    document.getElementById('sidebar-overlay').classList.add('hidden');
                }
            });
        };
    </script>
</body>
</html>
