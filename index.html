<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikah Planner Malaysia | KRAF DIANA ENTERPRISE</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1B4332;
            --secondary: #D4AF37;
            --bg: #F8F9FA;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1A1A1A; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .transition-all { transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(27, 67, 50, 0.05), 0 8px 10px -6px rgba(27, 67, 50, 0.05); }
        
        .card-digital {
            aspect-ratio: 9/16;
            background: linear-gradient(rgba(27, 67, 50, 0.8), rgba(27, 67, 50, 0.9)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Config & Initialization ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDt1uh8mZ1fT7YZXCfchNvtctBZDQvRn-E",
                authDomain: "nikah-planner.firebaseapp.com",
                projectId: "nikah-planner",
                storageBucket: "nikah-planner.firebasestorage.app",
                messagingSenderId: "423300738000",
                appId: "1:423300738000:web:b8f977f29ebdd9b19a27d5"
            };

        const appId = typeof __app_id !== 'undefined' ? __app_id : "nikah-planner-saas";

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Constants & Translations ---
        const translations = {
            en: {
                dashboard: "Dashboard", checklist: "Checklist", budget: "Budget Tracker", guestlist: "Guest & RSVP",
                vendors: "Vendors", cardMaker: "Digital Card", library: "Library", premium: "Premium",
                pricing: "Pricing", signout: "Sign Out", upgrade: "Upgrade Now", welcome: "Assalamu'alaikum",
                jakim: "JAKIM COMPLIANT", target: "Target", current: "Saved", remaining: "Baki",
                tasks: "Tasks", spent: "Spent", guests: "Guests", countdown: "Days to Go",
                add: "Add New", save: "Save Changes", edit: "Edit", delete: "Delete",
                status: "Status", name: "Name", category: "Category", amount: "Amount",
                income: "Income", expense: "Expense", balance: "Balance",
                vendorName: "Vendor Name", contact: "Contact", service: "Service",
                attire: "Attire Sizes", emergency: "Emergency Kit", songs: "Song List",
                planners: "Collaborators", settings: "Settings"
            },
            ms: {
                dashboard: "Papan Pemuka", checklist: "Senarai Semak", budget: "Penjejak Bajet", guestlist: "Tetamu & RSVP",
                vendors: "Vendor", cardMaker: "Kad Digital", library: "Arkib Dokumen", premium: "Ahli Premium",
                pricing: "Harga", signout: "Log Keluar", upgrade: "Naik Taraf", welcome: "Assalamu'alaikum",
                jakim: "PATUH JAKIM", target: "Sasaran", current: "Simpanan", remaining: "Baki",
                tasks: "Tugasan", spent: "Belanja", guests: "Tetamu", countdown: "Hari Lagi",
                add: "Tambah Baru", save: "Simpan", edit: "Edit", delete: "Padam",
                status: "Status", name: "Nama", category: "Kategori", amount: "Jumlah",
                income: "Pendapatan", expense: "Perbelanjaan", balance: "Baki",
                vendorName: "Nama Vendor", contact: "No. Telefon", service: "Perkhidmatan",
                attire: "Saiz Baju", emergency: "Kit Kecemasan", songs: "Senarai Lagu",
                planners: "Kolaborator", settings: "Tetapan"
            }
        };

        const JAKIM_CHECKLIST = [
            { id: 1, task: "Attend Premarital Course", task_ms: "Hadir Kursus Pra-Perkahwinan", category: "Religious", deadline: "6 Months Before" },
            { id: 2, task: "HIV Screening at Gov Clinic", task_ms: "Saringan HIV di Klinik Kesihatan", category: "Health", deadline: "3-6 Months Before" },
            { id: 3, task: "Online SPPIM Application", task_ms: "Permohonan Online SPPIM", category: "Legal", deadline: "90 Days Before" },
            { id: 4, task: "Groom's Permission Letter", task_ms: "Surat Kebenaran Pihak Lelaki", category: "Legal", deadline: "2 Months Before" },
            { id: 5, task: "Book Jurunikah (Kadi)", task_ms: "Tempah Jurunikah (Kadi)", category: "Religious", deadline: "1 Month Before" }
        ];

        // --- Helper Components ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-2xl border border-gray-100 p-6 custom-shadow ${className}`}>{children}</div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                    <div className="bg-white rounded-[32px] w-full max-w-lg overflow-hidden animate-in">
                        <div className="p-6 border-b flex justify-between items-center bg-[#1B4332] text-white">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full transition-all"><Icon name="x"/></button>
                        </div>
                        <div className="p-8 max-h-[80vh] overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // --- Application Logic ---
        function App() {
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('ms');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isPremium, setIsPremium] = useState(false);
            const [weddingData, setWeddingData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [activeModal, setActiveModal] = useState(null);

            const t = translations[lang];

            // Firebase Auth
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token).catch(console.error);
                    } else {
                        await auth.signInAnonymously().catch(console.error);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        // Fetch Status
                        const statusRef = db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('profile').doc('status');
                        const statusSnap = await statusRef.get();
                        if (statusSnap.exists) setIsPremium(statusSnap.data().isPremium);

                        // Fetch Wedding Data
                        const weddingCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('weddings');
                        weddingCol.onSnapshot(snap => {
                            const docs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            const myWedding = docs.find(w => w.ownerId === u.uid || (w.collaborators && w.collaborators.includes(u.email)));
                            if (myWedding) {
                                setWeddingData(myWedding);
                            } else {
                                createInitialWedding(u.uid, u.email || 'anonymous');
                            }
                            setLoading(false);
                        }, err => {
                            console.error(err);
                            setLoading(false);
                        });
                    }
                });
                return () => unsubscribe();
            }, []);

            const createInitialWedding = async (uid, email) => {
                const init = {
                    name: "Majlis Pernikahan Impian",
                    ownerId: uid,
                    ownerEmail: email,
                    date: '2025-12-31',
                    hashtag: '#NikahPlannerMY',
                    checklist: JAKIM_CHECKLIST.map(i => ({...i, status: 'pending'})),
                    budget: [],
                    guestlist: [],
                    vendors: [],
                    attire: { groom: {}, bride: {} },
                    emergencyKit: [],
                    songs: [],
                    collaborators: [],
                    savings: { target: 20000, current: 0 }
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('weddings').add(init);
            };

            const updateDB = async (field, value) => {
                if (!weddingData || !user) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('weddings').doc(weddingData.id).update({ [field]: value });
            };

            const handleLogout = () => auth.signOut();

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-16 h-16 border-4 border-[#1B4332] border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-6 font-black text-[#1B4332] tracking-widest uppercase text-xs animate-pulse">Nikah Planner Malaysia</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-gray-100 z-50 flex items-center justify-between px-4 md:px-8">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="lg:hidden p-2 text-[#1B4332] hover:bg-gray-50 rounded-xl transition-all"><Icon name="menu"/></button>
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-[#1B4332] rounded-xl flex items-center justify-center shadow-lg shadow-[#1B4332]/20">
                                    <Icon name="heart" className="text-[#D4AF37] fill-[#D4AF37] w-6 h-6"/>
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="font-bold text-[#1B4332] leading-none text-sm tracking-tight">Nikah Planner</h1>
                                    <p className="text-[9px] text-[#D4AF37] font-black tracking-widest uppercase mt-0.5">Malaysia</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <button onClick={() => setLang(lang === 'ms' ? 'en' : 'ms')} className="bg-gray-50 border border-gray-100 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase text-[#1B4332] hover:bg-gray-100 transition-all flex items-center gap-2">
                                <Icon name="languages" className="w-3 h-3 text-[#D4AF37]"/> {lang === 'en' ? 'BM' : 'EN'}
                            </button>
                            {isPremium && <span className="hidden md:flex items-center gap-1 text-[9px] font-black bg-amber-50 text-[#D4AF37] border border-amber-100 px-3 py-1.5 rounded-full tracking-widest uppercase shadow-sm"><Icon name="zap" className="w-2.5 h-2.5"/> {t.premium}</span>}
                            <button onClick={handleLogout} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"><Icon name="log-out"/></button>
                        </div>
                    </header>

                    <div className="flex pt-16 flex-1 overflow-hidden h-screen">
                        {/* Sidebar */}
                        <aside className={`fixed lg:static inset-y-0 left-0 w-72 bg-white border-r border-gray-100 z-40 transition-transform lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'}`}>
                            <div className="p-6 space-y-1 h-full flex flex-col overflow-y-auto">
                                <div className="pb-4 border-b border-gray-50 mb-4">
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-4 mb-2">Main Menu</p>
                                    {[
                                        { id: 'dashboard', label: t.dashboard, icon: 'layout-dashboard' },
                                        { id: 'checklist', label: t.checklist, icon: 'check-square' },
                                        { id: 'budget', label: t.budget, icon: 'wallet' },
                                        { id: 'guestlist', label: t.guestlist, icon: 'users' },
                                        { id: 'vendors', label: t.vendors, icon: 'store' },
                                    ].map(item => (
                                        <button key={item.id} onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                                            className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all ${activeTab === item.id ? 'bg-[#1B4332] text-white shadow-lg shadow-[#1B4332]/20' : 'text-gray-400 hover:bg-gray-50'}`}>
                                            <Icon name={item.icon} className="w-5 h-5"/> {item.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="pb-4">
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-4 mb-2">Personalize</p>
                                    {[
                                        { id: 'cardMaker', label: t.cardMaker, icon: 'clapperboard' },
                                        { id: 'attire', label: t.attire, icon: 'scissors' },
                                        { id: 'emergency', label: t.emergency, icon: 'briefcase-medical' },
                                        { id: 'library', label: t.library, icon: 'book-open' },
                                    ].map(item => (
                                        <button key={item.id} onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                                            className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all ${activeTab === item.id ? 'bg-[#1B4332] text-white shadow-lg' : 'text-gray-400 hover:bg-gray-50'}`}>
                                            <Icon name={item.icon} className="w-5 h-5"/> {item.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-auto pt-6 border-t border-gray-50">
                                    {!isPremium && (
                                        <div onClick={() => setActiveTab('pricing')} className="cursor-pointer p-4 bg-gradient-to-br from-amber-50 to-amber-100 rounded-3xl border border-amber-200 flex items-center gap-4 group hover:scale-[1.02] transition-all">
                                            <div className="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm"><Icon name="zap" className="text-[#D4AF37] fill-[#D4AF37]"/></div>
                                            <div>
                                                <p className="text-[10px] font-black text-[#D4AF37] uppercase tracking-tighter">Premium</p>
                                                <p className="text-[11px] font-bold text-[#1B4332]">{t.upgrade}</p>
                                            </div>
                                        </div>
                                    )}
                                    <div className="mt-6 flex items-center gap-3 px-4">
                                        <div className="w-8 h-8 rounded-full bg-[#1B4332] flex items-center justify-center text-white text-[10px] font-bold uppercase">{user.email ? user.email[0] : 'U'}</div>
                                        <div className="truncate">
                                            <p className="text-[10px] font-black text-[#1B4332] truncate">{user.email || 'Guest User'}</p>
                                            <p className="text-[8px] text-gray-400 font-bold uppercase tracking-widest">{isPremium ? 'Platinum' : 'Free Tier'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* Content */}
                        <main className="flex-1 p-4 md:p-10 bg-[#F8F9FA] overflow-y-auto">
                            {activeTab === 'dashboard' && weddingData && (
                                <div className="max-w-6xl mx-auto space-y-8 animate-in">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                        <div className="space-y-1">
                                            <h2 className="text-3xl font-bold text-[#1B4332] font-serif">{weddingData.name}</h2>
                                            <div className="flex items-center gap-4 text-gray-400">
                                                <p className="text-xs font-bold flex items-center gap-1.5"><Icon name="calendar" className="w-4 h-4"/> {weddingData.date}</p>
                                                <p className="text-xs font-bold flex items-center gap-1.5"><Icon name="hash" className="w-4 h-4 text-[#D4AF37]"/> {weddingData.hashtag}</p>
                                            </div>
                                        </div>
                                        <div className="bg-[#D4AF37]/10 text-[#1B4332] px-5 py-2.5 rounded-full border border-[#D4AF37]/20 text-[10px] font-black tracking-widest uppercase flex items-center gap-2 shadow-sm">
                                            <Icon name="shield-check" className="w-4 h-4 text-[#D4AF37]"/> {t.jakim}
                                        </div>
                                    </header>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <Card className="flex items-center gap-4 group hover:border-[#1B4332]/20 transition-all">
                                            <div className="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-green-600 transition-transform group-hover:scale-110"><Icon name="check-circle-2"/></div>
                                            <div><p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">{t.tasks}</p><h3 className="text-2xl font-bold">{weddingData.checklist?.filter(c => c.status === 'completed').length || 0}/{weddingData.checklist?.length}</h3></div>
                                        </Card>
                                        <Card className="flex items-center gap-4 group hover:border-[#1B4332]/20 transition-all">
                                            <div className="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-600 transition-transform group-hover:scale-110"><Icon name="wallet"/></div>
                                            <div><p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">{t.spent}</p><h3 className="text-2xl font-bold">RM {weddingData.budget?.reduce((a, b) => a + (b.type === 'expense' ? b.amount : 0), 0).toLocaleString()}</h3></div>
                                        </Card>
                                        <Card className="flex items-center gap-4 group hover:border-[#1B4332]/20 transition-all">
                                            <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 transition-transform group-hover:scale-110"><Icon name="users"/></div>
                                            <div><p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">{t.guests}</p><h3 className="text-2xl font-bold">{weddingData.guestlist?.length || 0}</h3></div>
                                        </Card>
                                        <Card className="bg-[#1B4332] text-white flex items-center gap-4 group hover:bg-[#1B4332]/90 transition-all shadow-xl shadow-[#1B4332]/10">
                                            <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-[#D4AF37]"><Icon name="timer"/></div>
                                            <div><p className="text-[10px] text-white/60 font-black uppercase tracking-widest">{t.countdown}</p><h3 className="text-2xl font-bold">124</h3></div>
                                        </Card>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <Card className="p-8">
                                            <div className="flex justify-between items-center mb-6">
                                                <h4 className="font-bold text-[#1B4332] flex items-center gap-2"><Icon name="piggy-bank" className="text-[#D4AF37]"/> {t.savings}</h4>
                                                <span className="text-[10px] font-black bg-green-50 text-green-700 px-3 py-1 rounded-full uppercase">Update</span>
                                            </div>
                                            <div className="space-y-6">
                                                <div className="flex justify-between items-end">
                                                    <div><p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{t.current}</p><h5 className="text-3xl font-black text-[#1B4332]">RM {weddingData.savings?.current.toLocaleString()}</h5></div>
                                                    <div className="text-right"><p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{t.target}</p><p className="text-lg font-bold text-gray-400">RM {weddingData.savings?.target.toLocaleString()}</p></div>
                                                </div>
                                                <div className="h-3 w-full bg-gray-50 rounded-full overflow-hidden border border-gray-100">
                                                    <div className="h-full bg-gradient-to-r from-[#1B4332] to-[#2D6A4F] transition-all duration-1000" style={{ width: `${Math.min(100, (weddingData.savings.current / weddingData.savings.target) * 100)}%` }}></div>
                                                </div>
                                                <div className="flex justify-between text-[10px] font-black text-gray-400 uppercase">
                                                    <span>{Math.round((weddingData.savings.current / weddingData.savings.target) * 100)}% Collected</span>
                                                    <span>Baki: RM {(weddingData.savings.target - weddingData.savings.current).toLocaleString()}</span>
                                                </div>
                                            </div>
                                        </Card>
                                        <Card className="p-0 overflow-hidden flex flex-col">
                                            <div className="p-8 border-b">
                                                <h4 className="font-bold text-[#1B4332] flex items-center gap-2"><Icon name="list-checks" className="text-[#D4AF37]"/> Prosedur Segera</h4>
                                            </div>
                                            <div className="divide-y overflow-y-auto max-h-[280px]">
                                                {weddingData.checklist?.filter(c => c.status === 'pending').slice(0, 4).map((task, i) => (
                                                    <div key={i} className="p-5 flex items-center justify-between group hover:bg-gray-50 transition-all">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-8 h-8 rounded-xl bg-amber-50 flex items-center justify-center text-amber-600 font-bold text-xs">{i+1}</div>
                                                            <div>
                                                                <p className="text-sm font-bold text-[#1B4332]">{lang === 'ms' ? task.task_ms : task.task}</p>
                                                                <p className="text-[10px] text-gray-400 font-black uppercase tracking-tighter">{task.deadline}</p>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => {
                                                            const copy = [...weddingData.checklist];
                                                            const idx = copy.findIndex(c => c.id === task.id);
                                                            copy[idx].status = 'completed';
                                                            updateDB('checklist', copy);
                                                        }} className="opacity-0 group-hover:opacity-100 p-2 text-green-600 hover:bg-green-50 rounded-xl transition-all"><Icon name="check"/></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </Card>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'checklist' && weddingData && (
                                <div className="max-w-4xl mx-auto space-y-6 animate-in">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-2xl font-bold text-[#1B4332]">{t.checklist}</h2>
                                        <div className="text-[10px] font-black uppercase text-gray-400 bg-white px-4 py-2 rounded-xl border border-gray-100 shadow-sm">
                                            Total: {weddingData.checklist?.length} Prosedur
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        {weddingData.checklist?.map((task, i) => (

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
