<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikah Planner Malaysia | KRAF DIANA ENTERPRISE</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; color: #1A1A1A; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .transition-all { transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #1B4332; border-radius: 10px; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(27, 67, 50, 0.05), 0 8px 10px -6px rgba(27, 67, 50, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Config ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDt1uh8mZ1fT7YZXCfchNvtctBZDQvRn-E",
                authDomain: "nikah-planner.firebaseapp.com",
                projectId: "nikah-planner",
                storageBucket: "nikah-planner.firebasestorage.app",
                messagingSenderId: "423300738000",
                appId: "1:423300738000:web:b8f977f29ebdd9b19a27d5"
            };

        const appId = typeof __app_id !== 'undefined' ? __app_id : "nikah-planner-my";

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Translations ---
        const translations = {
            en: {
                dashboard: "Dashboard", checklist: "Checklist", budget: "Budget", collaborators: "Collaborators", 
                pricing: "Pricing", savings: "Savings Tracker", attire: "Attire Sizes", emergency: "Emergency Kit",
                guestlist: "Guest List", tools: "Wedding Identity", notes: "Notes & Songs", contacts: "Contact List",
                welcome: "Welcome", premium: "Premium", upgrade: "Upgrade Now", signout: "Sign Out",
                target: "Target", current: "Current", remaining: "Remaining", jakim: "JAKIM COMPLIANT",
                pay: "Pay Now", secure: "Secure Checkout", hashtag: "Hashtag", theme: "Theme",
                confirmed: "Confirmed", pending: "Pending"
            },
            ms: {
                dashboard: "Papan Pemuka", checklist: "Senarai Semak", budget: "Bajet", collaborators: "Kolaborator", 
                pricing: "Harga", savings: "Tabung Kahwin", attire: "Saiz Baju", emergency: "Kit Kecemasan",
                guestlist: "Senarai Tetamu", tools: "Identiti Majlis", notes: "Nota & Lagu", contacts: "Buku Kenalan",
                welcome: "Selamat Datang", premium: "Ahli Premium", upgrade: "Naik Taraf", signout: "Log Keluar",
                target: "Sasaran", current: "Simpanan", remaining: "Baki", jakim: "PATUH JAKIM",
                pay: "Bayar Sekarang", secure: "Pembayaran Selamat", hashtag: "Hashtag", theme: "Tema",
                confirmed: "Selesai", pending: "Belum"
            }
        };

        // --- Templates ---
        const JAKIM_TEMPLATE = [
            { category: 'Preparation', task: 'Attend Premarital Course', task_ms: 'Hadir Kursus Pra-Perkahwinan', deadline: '6 Months Before' },
            { category: 'Preparation', task: 'HIV Screening', task_ms: 'Saringan HIV', deadline: '3-6 Months Before' },
            { category: 'Legal', task: 'Online Application (SPPIM)', task_ms: 'Permohonan Online (SPPIM)', deadline: '90 Days Before' }
        ];

        // --- Helper Components ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-2xl border border-gray-100 p-6 custom-shadow ${className}`}>{children}</div>
        );

        // --- Main App ---
        function App() {
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('ms');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isPremium, setIsPremium] = useState(false);
            const [weddingData, setWeddingData] = useState(null);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [paymentModal, setPaymentModal] = useState(null);

            const t = translations[lang];

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { 
                        console.error("Auth failed:", e);
                        setLoading(false); // Force stop loading even on failure
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        // Rule 1: Always use strict paths
                        const statusDoc = await db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('profile').doc('status').get();
                        if (statusDoc.exists) setIsPremium(statusDoc.data().isPremium);
                        
                        db.collection('artifacts').doc(appId).collection('public').doc('data').collection('weddings')
                        .onSnapshot(snap => {
                            const all = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            const mine = all.find(w => w.ownerId === u.uid || (w.planners && w.planners.includes(u.email)));
                            if (mine) setWeddingData(mine);
                            else createInitialWedding(u.uid, u.email);
                            setLoading(false);
                        }, err => {
                            console.error(err);
                            setLoading(false);
                        });
                    } else {
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            const createInitialWedding = async (uid, email) => {
                const data = {
                    name: "Nikah Journey",
                    ownerId: uid, ownerEmail: email || 'anonymous',
                    date: '2025-12-01',
                    checklist: JAKIM_TEMPLATE.map(i => ({...i, status: 'pending'})),
                    savings: { target: 15000, current: 0 },
                    attire: { groom: {}, bride: {} },
                    guestList: [],
                    identity: { hashtag: '#SamaPadan', theme: 'Traditional White' },
                    songList: [],
                    contacts: []
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('weddings').add(data);
            };

            const updateDB = async (field, value) => {
                if (!weddingData) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('weddings').doc(weddingData.id).update({ [field]: value });
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-[#1B4332] border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-4 font-bold text-[#1B4332] tracking-widest uppercase text-xs">Memulakan Perancang Nikah...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navbar */}
                    <nav className="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-gray-100 z-50 flex items-center justify-between px-6">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="lg:hidden"><Icon name="menu" /></button>
                            <div className="w-10 h-10 bg-[#1B4332] rounded-xl flex items-center justify-center">
                                <Icon name="heart" className="text-[#D4AF37] fill-[#D4AF37]" />
                            </div>
                            <span className="font-bold text-[#1B4332] hidden sm:block">Nikah Planner <span className="text-[#D4AF37] text-[10px] block font-black uppercase">Malaysia</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setLang(lang === 'en' ? 'ms' : 'en')} className="bg-gray-50 border px-3 py-1 rounded-lg text-[10px] font-black uppercase text-[#1B4332] flex items-center gap-2">
                                <Icon name="languages" className="w-3 h-3 text-[#D4AF37]" /> {lang === 'en' ? 'BM' : 'EN'}
                            </button>
                            {isPremium && <span className="text-[9px] font-black bg-amber-50 text-[#D4AF37] border border-amber-100 px-2 py-1 rounded-full">{t.premium}</span>}
                            <button onClick={() => auth.signOut()} className="text-gray-400 hover:text-red-500"><Icon name="log-out" /></button>
                        </div>
                    </nav>

                    <div className="flex pt-16 flex-1 overflow-hidden h-screen">
                        {/* Sidebar */}
                        <aside className={`fixed lg:static inset-y-0 left-0 w-64 bg-white border-r border-gray-100 z-40 transition-transform lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0 shadow-xl' : '-translate-x-full'}`}>
                            <div className="p-6 space-y-1 h-full flex flex-col overflow-y-auto">
                                {[
                                    { id: 'dashboard', label: t.dashboard, icon: 'layout-dashboard' },
                                    { id: 'checklist', label: t.checklist, icon: 'check-square' },
                                    { id: 'guestlist', label: t.guestlist, icon: 'users' },
                                    { id: 'savings', label: t.savings, icon: 'piggy-bank' },
                                    { id: 'attire', label: t.attire, icon: 'scissors' },
                                    { id: 'tools', label: t.tools, icon: 'sparkles' },
                                    { id: 'contacts', label: t.contacts, icon: 'book-open' },
                                    { id: 'pricing', label: t.pricing, icon: 'credit-card' }
                                ].map(item => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === item.id ? 'bg-[#1B4332] text-white' : 'text-gray-400 hover:bg-gray-50'}`}>
                                        <Icon name={item.icon} className="w-4 h-4" /> {item.label}
                                    </button>
                                ))}
                            </div>
                        </aside>

                        {/* Content */}
                        <main className="flex-1 p-6 md:p-10 bg-[#F8F9FA] overflow-y-auto">
                            {activeTab === 'dashboard' && weddingData && (
                                <div className="space-y-8 animate-in">
                                    <h2 className="text-3xl font-bold text-[#1B4332]">{weddingData.name}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <Card className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center text-green-600"><Icon name="users" /></div>
                                            <div><p className="text-[10px] font-black text-gray-400 uppercase">{t.guests}</p><p className="text-xl font-bold">{weddingData.guestList?.length || 0}</p></div>
                                        </Card>
                                        <Card className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600"><Icon name="wallet" /></div>
                                            <div><p className="text-[10px] font-black text-gray-400 uppercase">Savings</p><p className="text-xl font-bold">RM {weddingData.savings?.current?.toLocaleString()}</p></div>
                                        </Card>
                                        <Card className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><Icon name="calendar" /></div>
                                            <div><p className="text-[10px] font-black text-gray-400 uppercase">Tarikh</p><p className="text-xl font-bold">{weddingData.date}</p></div>
                                        </Card>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'guestlist' && weddingData && (
                                <div className="space-y-6 animate-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-bold text-[#1B4332]">{t.guestlist}</h2>
                                        <button onClick={() => updateDB('guestList', [...(weddingData.guestList || []), { name: 'Tetamu Baru', status: 'pending' }])} 
                                            className="bg-[#1B4332] text-white px-4 py-2 rounded-xl text-xs font-bold">+ Tetamu</button>
                                    </div>
                                    <Card className="p-0 overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                                                <tr><th className="p-4">Nama</th><th className="p-4">Status</th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {(weddingData.guestList || []).map((g, i) => (
                                                    <tr key={i}><td className="p-4 text-sm font-bold">{g.name}</td>
                                                        <td className="p-4">
                                                            <button onClick={() => {
                                                                const copy = [...weddingData.guestList];
                                                                copy[i].status = copy[i].status === 'confirmed' ? 'pending' : 'confirmed';
                                                                updateDB('guestList', copy);
                                                            }} className={`text-[10px] font-black px-3 py-1 rounded-full uppercase ${g.status === 'confirmed' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'}`}>
                                                                {g.status === 'confirmed' ? t.confirmed : t.pending}
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </Card>
                                </div>
                            )}

                            {activeTab === 'tools' && weddingData && (
                                <div className="space-y-6 animate-in">
                                    <h2 className="text-2xl font-bold text-[#1B4332]">{t.tools}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <Card>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">{t.hashtag}</label>
                                            <input type="text" value={weddingData.identity?.hashtag || ''} 
                                                onChange={(e) => updateDB('identity', { ...weddingData.identity, hashtag: e.target.value })}
                                                className="w-full p-3 border rounded-xl font-bold text-[#1B4332]" />
                                        </Card>
                                        <Card>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">{t.theme}</label>
                                            <input type="text" value={weddingData.identity?.theme || ''} 
                                                onChange={(e) => updateDB('identity', { ...weddingData.identity, theme: e.target.value })}
                                                className="w-full p-3 border rounded-xl font-bold text-[#1B4332]" />
                                        </Card>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'contacts' && weddingData && (
                                <div className="space-y-6 animate-in">
                                    <h2 className="text-2xl font-bold text-[#1B4332]">{t.contacts}</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {['Catering', 'Photographer', 'MUA', 'Pelamin', 'Kadi'].map(vendor => (
                                            <Card key={vendor} className="flex justify-between items-center">
                                                <div>
                                                    <p className="text-[10px] font-black text-gray-400 uppercase">{vendor}</p>
                                                    <p className="text-sm font-bold text-[#1B4332]">Tiada Maklumat</p>
                                                </div>
                                                <button className="text-[#D4AF37]"><Icon name="phone" /></button>
                                            </Card>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Reuse existing logic for other tabs if needed */}
                            {['checklist', 'savings', 'attire', 'emergency', 'pricing'].includes(activeTab) && (
                                <div className="h-full flex items-center justify-center text-gray-400 italic font-medium py-20">
                                    Ciri {activeTab} sedang aktif. Sila muat semula jika tidak muncul.
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
