<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nikah Planner Malaysia | KRAF DIANA ENTERPRISE</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Inter, sans-serif; background:#f8f9fa; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- APP ---------------- */

function App() {

  const [user, setUser] = useState(null);
  const [wedding, setWedding] = useState(null);
  const [loading, setLoading] = useState(true);

  /* AUTH */
  useEffect(() => {
    auth.onAuthStateChanged(async (u) => {
      if (u) {
        setUser(u);
        await loadWedding(u.uid);
      } else {
        await auth.signInAnonymously();
      }
    });
  }, []);

  /* LOAD / CREATE WEDDING */
  const loadWedding = async (uid) => {

    const ref = db.collection("weddings").doc(uid);
    const doc = await ref.get();

    if (!doc.exists) {
      await ref.set({
        ownerId: uid,
        name: "Majlis Pernikahan Impian",
        date: "2026-12-31",
        checklist: [
          { id:1, task:"Attend Course", status:"pending" },
          { id:2, task:"HIV Test", status:"pending" }
        ],
        budget: [],
        guestlist: []
      });
    }

    ref.onSnapshot((snap) => {
      setWedding({ id: snap.id, ...snap.data() });
      setLoading(false);
    });
  };

  const updateWedding = async (field, value) => {
    if (!wedding) return;
    await db.collection("weddings").doc(wedding.id).update({
      [field]: value
    });
  };

  if (loading) {
    return (
      <div className="h-screen flex items-center justify-center">
        Loading...
      </div>
    );
  }

  /* ---------------- UI ---------------- */

  return (
    <div className="p-8 max-w-4xl mx-auto space-y-8">

      <h1 className="text-3xl font-bold text-green-800">
        {wedding.name}
      </h1>

      <p className="text-gray-500">
        Date: {wedding.date}
      </p>

      {/* CHECKLIST */}
      <div className="bg-white p-6 rounded-2xl shadow">
        <h2 className="font-bold mb-4">Checklist</h2>

        {wedding.checklist.map((task, i) => (
          <div key={task.id} className="flex justify-between items-center py-2">
            
            <label className="flex items-center gap-2">
              <input
                type="checkbox"
                checked={task.status === "completed"}
                onChange={() => {
                  const updated = [...wedding.checklist];
                  updated[i].status =
                    task.status === "completed"
                      ? "pending"
                      : "completed";
                  updateWedding("checklist", updated);
                }}
              />
              {task.task}
            </label>

          </div>
        ))}
      </div>

      {/* ADD BUDGET */}
      <div className="bg-white p-6 rounded-2xl shadow space-y-4">
        <h2 className="font-bold">Budget</h2>

        <button
          className="bg-green-800 text-white px-4 py-2 rounded-xl"
          onClick={() => {
            const name = prompt("Item name:");
            const amount = parseFloat(prompt("Amount RM:"));
            if (!name || isNaN(amount)) return;

            const updated = [
              ...(wedding.budget || []),
              { name, amount }
            ];

            updateWedding("budget", updated);
          }}
        >
          Add Budget Item
        </button>

        <div className="space-y-2">
          {wedding.budget?.map((item, i) => (
            <div key={i} className="flex justify-between">
              <span>{item.name}</span>
              <span>RM {item.amount}</span>
            </div>
          ))}
        </div>
      </div>

      {/* GUESTLIST */}
      <div className="bg-white p-6 rounded-2xl shadow space-y-4">
        <h2 className="font-bold">Guest List</h2>

        <button
          className="bg-green-800 text-white px-4 py-2 rounded-xl"
          onClick={() => {
            const name = prompt("Guest name:");
            if (!name) return;

            const updated = [
              ...(wedding.guestlist || []),
              { name }
            ];

            updateWedding("guestlist", updated);
          }}
        >
          Add Guest
        </button>

        <div className="space-y-2">
          {wedding.guestlist?.map((g, i) => (
            <div key={i}>{g.name}</div>
          ))}
        </div>
      </div>

      <button
        onClick={() => auth.signOut()}
        className="text-red-600"
      >
        Logout
      </button>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
